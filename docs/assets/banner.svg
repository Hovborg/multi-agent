<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.05" stroke="#8b5cf6">
    <line x1="0" y1="40" x2="800" y2="40" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="200" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="200" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="200" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="200" stroke-width="0.5"/>
  </g>

  <!-- Agent nodes (left side) -->
  <!-- Node 1 -->
  <circle cx="120" cy="55" r="16" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
  <circle cx="120" cy="55" r="6" fill="#6366f1" opacity="0.5"/>
  <!-- Node 2 -->
  <circle cx="80" cy="110" r="16" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
  <circle cx="80" cy="110" r="6" fill="#8b5cf6" opacity="0.5"/>
  <!-- Node 3 -->
  <circle cx="140" cy="150" r="16" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <circle cx="140" cy="150" r="6" fill="#a78bfa" opacity="0.5"/>

  <!-- Connection lines (left) -->
  <line x1="132" y1="67" x2="92" y2="98" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="92" y1="122" x2="128" y2="138" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
  <line x1="136" y1="55" x2="175" y2="80" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <!-- Agent nodes (right side) -->
  <!-- Node 4 -->
  <circle cx="680" cy="50" r="16" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <circle cx="680" cy="50" r="6" fill="#a78bfa" opacity="0.5"/>
  <!-- Node 5 -->
  <circle cx="720" cy="110" r="16" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
  <circle cx="720" cy="110" r="6" fill="#6366f1" opacity="0.5"/>
  <!-- Node 6 -->
  <circle cx="670" cy="155" r="16" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
  <circle cx="670" cy="155" r="6" fill="#8b5cf6" opacity="0.5"/>

  <!-- Connection lines (right) -->
  <line x1="692" y1="62" x2="708" y2="98" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <line x1="708" y1="122" x2="682" y2="143" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="664" y1="50" x2="625" y2="75" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>

  <!-- Central text -->
  <text x="400" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">multi-agent</text>

  <!-- Accent line -->
  <rect x="280" y="92" width="240" height="2" rx="1" fill="url(#accent)" opacity="0.8"/>

  <!-- Tagline -->
  <text x="400" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a5a5c0" text-anchor="middle" letter-spacing="0.5">The definitive catalog of AI agent patterns</text>

  <!-- Stats -->
  <text x="270" y="158" font-family="ui-monospace, monospace" font-size="12" fill="#6366f1" text-anchor="middle">50+ Agents</text>
  <text x="400" y="158" font-family="ui-monospace, monospace" font-size="12" fill="#8b5cf6" text-anchor="middle">8 Patterns</text>
  <text x="530" y="158" font-family="ui-monospace, monospace" font-size="12" fill="#a78bfa" text-anchor="middle">6 Adapters</text>

  <!-- Dots between stats -->
  <circle cx="335" cy="155" r="2" fill="#6366f1" opacity="0.5"/>
  <circle cx="465" cy="155" r="2" fill="#8b5cf6" opacity="0.5"/>
</svg>
