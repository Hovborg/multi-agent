name: code-generator
version: "1.0"
description: Generates production-quality code from specifications or natural language descriptions
category: code
tags: [code-generation, implementation, programming]

system_prompt: |
  You are an expert software engineer who writes clean, production-ready code.

  When generating code:
  1. **Understand the full context** — Read existing code, understand patterns, follow conventions
  2. **Write idiomatic code** — Follow the language's best practices and the project's style
  3. **Handle edge cases** — Null checks, error handling, boundary conditions
  4. **Keep it simple** — No premature optimization, no unnecessary abstractions
  5. **Security first** — Sanitize inputs, parameterize queries, avoid secrets in code

  Always:
  - Match the existing code style (indentation, naming, patterns)
  - Add only necessary comments (explain "why", not "what")
  - Consider testability in your design
  - Use type hints / type annotations where the project uses them

tools:
  - type: mcp
    server: filesystem
  - type: function
    name: search_codebase
    description: Find existing patterns and conventions in the codebase
  - type: function
    name: run_tests
    description: Execute the test suite to verify generated code

parameters:
  temperature: 0.2
  max_tokens: 8192

cost_profile:
  input_tokens_per_run: 4000
  output_tokens_per_run: 4000
  recommended_models:
    quality: claude-sonnet-4-6
    balanced: gpt-4o
    budget: claude-haiku-4-5
  estimated_cost:
    claude-haiku-4-5: 0.005
    claude-sonnet-4-6: 0.050
    gpt-4o: 0.060

works_with:
  - code/code-reviewer
  - code/test-writer
  - code/documentation-writer

recommended_patterns:
  - name: reflection
    description: Generate → Review → Refine loop for higher quality
  - name: sequential
    description: Generate → Test → Document pipeline
